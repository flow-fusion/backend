version: '3.8'

# =============================================================================
# DEVELOPMENT MODE
# Use this for local development and testing
# =============================================================================

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: flowfusion-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: flowfusion
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Queue
  redis:
    image: redis:7-alpine
    container_name: flowfusion-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Ollama (Local LLM for AI summaries)
  ollama:
    image: ollama/ollama:latest
    container_name: flowfusion-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 4G

  # FastAPI Webhook Server
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: flowfusion-api
    command: >
      python -m uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
      --reload
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      - DEBUG=true
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/flowfusion
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - GITLAB_WEBHOOK_SECRET=test_secret_for_local_dev
      - GITLAB_API_TOKEN=${GITLAB_API_TOKEN:-}
      - JIRA_URL=${JIRA_URL:-}
      - JIRA_EMAIL=${JIRA_EMAIL:-}
      - JIRA_TOKEN=${JIRA_TOKEN:-}
      - AI_PROVIDER=ollama
      - AI_MODEL=llama3.2
      - AI_AUTO_GENERATE=true
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - LOG_LEVEL=DEBUG
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ollama:
        condition: service_started

  # Background Worker
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: flowfusion-worker
    command: python -m app.workers.worker --direct
    volumes:
      - .:/app
    environment:
      - DEBUG=true
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/flowfusion
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - GITLAB_WEBHOOK_SECRET=test_secret_for_local_dev
      - GITLAB_API_TOKEN=${GITLAB_API_TOKEN:-}
      - JIRA_URL=${JIRA_URL:-}
      - JIRA_EMAIL=${JIRA_EMAIL:-}
      - JIRA_TOKEN=${JIRA_TOKEN:-}
      - AI_PROVIDER=ollama
      - AI_MODEL=llama3.2
      - AI_AUTO_GENERATE=true
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - LOG_LEVEL=DEBUG
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ollama:
        condition: service_started

volumes:
  postgres_data:
  ollama_data:

networks:
  default:
    name: flowfusion-network
