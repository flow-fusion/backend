version: '3.8'

# =============================================================================
# DEVELOPMENT MODE
# Use this for local development and testing
# =============================================================================

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: flowfusion-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: flowfusion
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Queue
  redis:
    image: redis:7-alpine
    container_name: flowfusion-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # FastAPI Webhook Server
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: flowfusion-api
    command: >
      python -m uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
      --reload
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      - DEBUG=true
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/flowfusion
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - GITLAB_WEBHOOK_SECRET=dev_secret_change_in_production
      - GITLAB_API_TOKEN=${GITLAB_API_TOKEN:-}
      - JIRA_URL=${JIRA_URL:-}
      - JIRA_EMAIL=${JIRA_EMAIL:-}
      - JIRA_TOKEN=${JIRA_TOKEN:-}
      - LOG_LEVEL=DEBUG
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Background Worker
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: flowfusion-worker
    command: python -m app.workers.worker --direct
    volumes:
      - .:/app
    environment:
      - DEBUG=true
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/flowfusion
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - GITLAB_WEBHOOK_SECRET=dev_secret_change_in_production
      - GITLAB_API_TOKEN=${GITLAB_API_TOKEN:-}
      - JIRA_URL=${JIRA_URL:-}
      - JIRA_EMAIL=${JIRA_EMAIL:-}
      - JIRA_TOKEN=${JIRA_TOKEN:-}
      - LOG_LEVEL=DEBUG
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:

networks:
  default:
    name: flowfusion-network
